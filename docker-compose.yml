version: "3.9"
services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - cognee_data:/app/.cognee_system
      - data_storage:/app/.data_storage

  frontend:
    build: 
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  cognee_data:
  data_storage:
